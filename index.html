<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan & Sophia | Wedding Invitation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&display=swap');
    
    body { font-family: 'Playfair Display', serif; }
    .script-font { font-family: 'Dancing Script', cursive; }

    /* Realistic Envelope */
    .envelope {
      width: 320px;
      height: 220px;
      background: linear-gradient(#f8f8f8, #e8e8e8);
      border: 12px solid #9f1239;
      border-radius: 10px 10px 50px 50px;
      position: relative;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.4s;
    }

    .envelope:hover {
      transform: scale(1.03);
    }

    /* Envelope Flap */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background: linear-gradient(#c026d3, #9f1239);
      clip-path: polygon(50% 65%, 0 0, 100% 0);
      transition: all 1s ease;
      z-index: 2;
    }

    .envelope.open .flap {
      height: 30px;
      transform: rotateX(180deg);
    }

    /* Button on Envelope */
    .open-btn {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: #9f1239;
      color: white;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgb(159 18 57);
      z-index: 3;
      transition: all 0.3s;
    }

    .open-btn:hover {
      background: #be123c;
      transform: translateX(-50%) scale(1.08);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-rose-50 via-amber-50 to-white min-h-screen">

  <!-- Envelope Screen -->
  <div id="envelope-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="text-center">
      <h1 class="script-font text-6xl text-rose-700 mb-10 tracking-wide">Ethan & Sophia</h1>
      
      <div id="envelope" class="envelope mx-auto" onclick="openEnvelope()">
        <div class="flap"></div>
        <button class="open-btn">
          Open Invitation <i class="fas fa-heart ml-2"></i>
        </button>
      </div>

      <p class="mt-8 text-gray-600 text-lg">Click the envelope to open</p>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content" class="hidden">
    <h1 class="text-center script-font text-7xl text-rose-600 py-20">Welcome to Our Wedding</h1>
    <!-- باقي المحتوى هيتضاف بعدين -->
  </div>

  <script>
    function openEnvelope() {
      const envelope = document.getElementById('envelope');
      envelope.classList.add('open');
      
      setTimeout(() => {
        document.getElementById('envelope-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
      }, 1100);
    }
  </script>
</body>
</html>
