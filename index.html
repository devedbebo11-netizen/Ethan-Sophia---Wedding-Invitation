<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan & Sophia | Wedding Invitation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap');
    
    body { 
      font-family: 'Playfair Display', serif; 
    }
    .script-font { 
      font-family: 'Dancing Script', cursive; 
    }

    /* Envelope */
    .envelope {
      width: 300px;
      height: 210px;
      background: linear-gradient(#f5f5f5, #e5e5e5);
      border: 14px solid #9f1239;
      border-radius: 12px 12px 55px 55px;
      position: relative;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.35);
      cursor: pointer;
      overflow: hidden;
    }

    .flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 105px;
      background: linear-gradient(#c026d3, #9f1239);
      clip-path: polygon(50% 68%, 0 0, 100% 0);
      transition: all 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }

    .envelope.open .flap {
      height: 25px;
      transform: rotateX(180deg);
    }

    .open-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #9f1239;
      color: white;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      z-index: 3;
      box-shadow: 0 8px 15px -3px rgb(159 18 57);
      transition: all 0.3s;
    }

    .open-btn:hover {
      background: #be123c;
      transform: translateX(-50%) scale(1.05);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-amber-50">

  <!-- === Envelope Screen === -->
  <div id="envelope-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="text-center">
      <h1 class="script-font text-5xl text-rose-700 mb-10">Ethan & Sophia</h1>
      
      <div id="envelope" class="envelope mx-auto" onclick="openEnvelope()">
        <div class="flap"></div>
        <button class="open-btn">
          Open Our Invitation <i class="fas fa-heart ml-1"></i>
        </button>
      </div>

      <p class="mt-8 text-gray-600">Tap to open</p>
    </div>
  </div>

  <!-- === Main Content === -->
  <div id="main-content" class="hidden">

    <!-- Hero -->
    <section class="min-h-screen flex items-center justify-center text-center px-6 bg-white">
      <div>
        <h1 class="script-font text-6xl md:text-7xl text-rose-600 mb-4">Ethan & Sophia</h1>
        <p class="text-2xl text-gray-700">are getting married</p>
        <div class="mt-10 bg-rose-50 inline-block px-10 py-6 rounded-3xl shadow">
          <p class="text-xl">December 25, 2026 • 5:00 PM</p>
        </div>
      </div>
    </section>

    <!-- Couple Photo -->
    <section class="py-20 bg-[#f8f1e9]">
      <div class="max-w-3xl mx-auto px-4 text-center">
        <img src="https://picsum.photos/id/1015/1200/800" alt="Couple" class="rounded-3xl shadow-2xl mx-auto">
        <p class="mt-12 script-font text-3xl text-rose-600 leading-relaxed">
          "You are the love I never knew I was looking for."
        </p>
      </div>
    </section>

    <!-- Maze Game -->
    <section class="py-20 bg-white text-center">
      <h2 class="text-4xl mb-8">Help Him Find Her ❤️</h2>
      <div id="maze-container" class="mx-auto rounded-3xl overflow-hidden shadow-inner" style="width: 320px; height: 320px;"></div>
      <button onclick="resetMaze()" class="mt-6 bg-rose-600 text-white px-8 py-3 rounded-full">Reset Maze</button>
    </section>

    <!-- Countdown -->
    <section class="py-20 bg-rose-600 text-white text-center">
      <h2 class="text-3xl mb-10">You're Invited to Our Wedding</h2>
      <div id="countdown" class="flex justify-center gap-6 md:gap-10 text-4xl"></div>
    </section>

    <!-- Gallery -->
    <section class="py-20 bg-[#f8f1e9]">
      <h2 class="text-4xl text-center mb-12">Our Love Story</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-5xl mx-auto px-4">
        <img src="https://picsum.photos/id/1016/600/400" class="rounded-2xl shadow">
        <img src="https://picsum.photos/id/133/600/400" class="rounded-2xl shadow">
        <img src="https://picsum.photos/id/201/600/400" class="rounded-2xl shadow">
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-16 text-center">
      <h2 class="script-font text-5xl mb-6">Together Forever</h2>
      <button onclick="showVenue()" class="bg-white text-rose-700 px-10 py-4 rounded-full text-lg font-medium">
        📍 View Wedding Venue
      </button>
      <a href="https://wa.me/20123456789" target="_blank" class="block mt-8 text-green-400 text-xl">
        📲 Contact Us on WhatsApp
      </a>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
